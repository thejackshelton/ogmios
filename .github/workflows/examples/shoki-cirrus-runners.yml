# Reference workflow: Cirrus Runners (cloud managed, tart-powered).
#
# Recommended managed option. Cirrus Runners are tart-powered on their side,
# so the VM layer is handled for you; you just pick the base image tag
# and the shoki setup action does the rest.
#
# One-time setup:
#   1. Install the Cirrus Runners GitHub App on your org:
#      https://github.com/apps/cirrus-runners
#   2. Pick a plan (starting ~$40/month/runner for macOS arm64).
#   3. That's it — the `cirrus-runners` label is now available.
#
# This is the cheapest managed path: typically ~40% cheaper than
# GitHub-hosted macos-latest with 3-5x faster startup (prewarmed tart VMs).
#
# Customize:
#   - `runs-on:` image tag (see Cirrus Runners docs)
#   - test command

name: Shoki tests (Cirrus Runners)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shoki-tests:
    name: Shoki — Cirrus Runners
    # See https://cirrus-runners.app/#supported-platforms for current tags.
    # Cirrus injects CIRRUS_CI=1 which `shoki/setup-action` auto-detects.
    runs-on: ghcr.io/cirruslabs/macos-runner:sonoma

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: ./.github/actions/setup
        with:
          topology: cirrus
          macos-version: sonoma

      - run: pnpm install --frozen-lockfile

      - name: Run shoki + vitest-browser-react example
        working-directory: examples/vitest-browser-react
        run: pnpm test

      - name: Post-job cleanup
        if: always()
        run: .github/actions/setup/kill-background-apps.sh

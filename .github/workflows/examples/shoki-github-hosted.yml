# Reference workflow: stock GitHub-hosted `macos-latest`.
#
# This works but it's expensive and slow. Use for occasional CI only, or as
# a fallback when your preferred topology is down. If you're going to run
# shoki tests on every PR, migrate to Cirrus Runners (cheapest managed path)
# or self-hosted tart (cheapest overall past ~50 minutes/day).
#
# Caveats:
#   - Cost: 10x Linux minute multiplier. A 5-min shoki run = 50 Linux-equiv min.
#   - Speed: cold-start ~2 min before your steps begin.
#   - TCC: SIP is on; shoki runs in "degraded" mode — only VO-AppleScript
#     enablement works, not pre-granted TCC for a helper bundle. Pure-web
#     tests (vitest-browser-react) are fine; iOS driver / helper-based tests
#     need tart or Cirrus Runners.
#
# Customize:
#   - `runs-on:` to `macos-14` or `macos-15` if you need a specific version
#   - test command

name: Shoki tests (GitHub-hosted macos-latest)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shoki-tests:
    name: Shoki — GitHub-hosted
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: ./.github/actions/setup
        with:
          topology: github-hosted
          macos-version: sonoma

      - run: pnpm install --frozen-lockfile

      - name: Run shoki + vitest-browser-react example
        working-directory: examples/vitest-browser-react
        run: pnpm test

      - name: Post-job cleanup
        if: always()
        run: .github/actions/setup/kill-background-apps.sh

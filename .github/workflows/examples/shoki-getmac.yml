# Reference workflow: GetMac managed runners.
#
# GetMac's managed macOS runner service. Positioned as a drop-in replacement
# for GitHub-hosted macOS with substantial cost savings. Bare-metal / ephemeral
# VMs (not tart-based on GetMac's side, but the effect from the job's POV
# is similar — fresh machine, full perf, no persistent state).
#
# One-time setup:
#   1. Sign up at https://www.getmac.io.
#   2. Add the `GETMAC=1` env var to your org/repo secrets (the setup action
#      uses this to pick the `getmac` topology path).
#   3. Register runners with the labels `self-hosted` + `macOS` + `getmac`.
#
# TCC grants are the sharp edge on GetMac: at runtime, SIP is on, so the
# runtime TCC grant insertion won't work. You have two options:
#   a) Ask GetMac to pre-bake a shoki-ready runner image (they support
#      custom images for paying plans).
#   b) Run in "degraded" shoki mode — only VO-AppleScript-enabled is set,
#      which suffices for pure-web tests (the vitest-browser-react example
#      works here).
#
# Customize:
#   - `runs-on:` labels to match your runner registration
#   - the `env: GETMAC` setting (the auto-detect looks for this)

name: Shoki tests (GetMac)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shoki-tests:
    name: Shoki — GetMac
    runs-on: [self-hosted, macOS, getmac]

    env:
      GETMAC: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: ./.github/actions/setup
        with:
          topology: getmac
          macos-version: sonoma

      - run: pnpm install --frozen-lockfile

      - name: Run shoki + vitest-browser-react example
        working-directory: examples/vitest-browser-react
        run: pnpm test

      - name: Post-job cleanup
        if: always()
        run: .github/actions/setup/kill-background-apps.sh

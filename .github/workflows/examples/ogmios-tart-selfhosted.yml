# Reference workflow: self-hosted tart runner.
#
# Use this when you run your own Mac mini / Mac Studio with `tart` installed
# and you've pulled the pre-baked ogmios image:
#
#   tart pull ghcr.io/thejackshelton/ogmios/macos-vo-ready:sonoma
#
# Register the host as a self-hosted runner with the labels `self-hosted`,
# `macOS`, and `tart`. The job below assumes that labeling.
#
# This is the BEST topology for heavy/continuous ogmios use:
#   - one Mac mini runs many parallel sessions (tart clones the image fast)
#   - TCC + VO AppleScript pre-applied inside the image (nothing to install)
#   - no per-job minute cost once the Mac is paid off
#   - full control of macOS version; pin whichever you need
#
# Customize:
#   - `runs-on:` labels to match your runner registration
#   - `macos-version:` to the tag you pulled
#   - test command at the bottom to your repo's conventions

name: Ogmios tests (self-hosted tart)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ogmios-tests:
    name: Ogmios — self-hosted tart
    runs-on: [self-hosted, macOS, tart]

    # The OGMIOS_TART env var is what `ogmios/setup-action` auto-detects
    # to pick the `tart` topology path.
    env:
      OGMIOS_TART: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: ./.github/actions/setup
        with:
          topology: tart
          macos-version: sonoma

      - run: pnpm install --frozen-lockfile

      - name: Run ogmios + vitest-browser-qwik example
        working-directory: examples/vitest-browser-qwik
        run: pnpm test

      - name: Post-job cleanup
        if: always()
        run: .github/actions/setup/kill-background-apps.sh

# SDK release (ogmios + @ogmios/binding-darwin-*). Helper apps (Ogmios.app,
# Ogmios Setup.app) are shipped via .github/workflows/app-release.yml on
# app-v* tags, NOT from this workflow. Phase 10-04 split the two channels:
# npm tarballs contain only ogmios.node, helper bundles live on GitHub Releases.
name: Release

on:
  push:
    tags: ["v*"]

# OIDC trusted publishing — no NPM_TOKEN secret required.
# Requires npm trusted publishers configured for each of:
#   ogmios, ogmios-darwin-arm64, ogmios-darwin-x64
# See docs/release-setup.md for one-time setup.

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-darwin-arm64:
    name: Build darwin-arm64 binding
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      # Phase 5 setup-action: no-op on GH-hosted in degraded mode, but it
      # quiesces background apps (reducing notarization-step interrupt risk)
      # and sets VO AppleScript for any signing-step smoke tests.
      - uses: ./.github/actions/setup
        with:
          topology: github-hosted
          skip-doctor: "true"
      - name: Import Developer ID cert
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_B64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
      - uses: ./.github/actions/build-zig-binding
        with:
          target: aarch64-macos
          binding-package-dir: packages/binding-darwin-arm64
      - name: Verify signatures
        run: |
          codesign -dvvv packages/binding-darwin-arm64/ogmios.node || echo "ogmios.node is not independently signed (helper app is the TCC trust anchor)"
      - uses: actions/upload-artifact@v4
        with:
          name: binding-darwin-arm64
          path: packages/binding-darwin-arm64/ogmios.node

  build-darwin-x64:
    name: Build darwin-x64 binding (cross-compile from macos-14)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          topology: github-hosted
          skip-doctor: "true"
      - name: Import Developer ID cert
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_B64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
      - uses: ./.github/actions/build-zig-binding
        with:
          target: x86_64-macos
          binding-package-dir: packages/binding-darwin-x64
      - name: Verify signatures
        run: |
          codesign -dvvv packages/binding-darwin-x64/ogmios.node || echo "ogmios.node is not independently signed (helper app is the TCC trust anchor)"
      - uses: actions/upload-artifact@v4
        with:
          name: binding-darwin-x64
          path: packages/binding-darwin-x64/ogmios.node

  publish:
    name: Publish to npm via OIDC
    runs-on: ubuntu-latest
    needs: [build-darwin-arm64, build-darwin-x64]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v8
        with:
          name: binding-darwin-arm64
          path: packages/binding-darwin-arm64
      - uses: actions/download-artifact@v8
        with:
          name: binding-darwin-x64
          path: packages/binding-darwin-x64
      - run: pnpm -r build
      - name: Publish (OIDC trusted publishing)
        run: pnpm publish -r --access public --no-git-checks --provenance

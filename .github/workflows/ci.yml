name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint + typecheck (TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm lint

  zig-test:
    name: Zig unit tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-zig-binding
        with:
          target: aarch64-macos
          binding-package-dir: packages/binding-darwin-arm64
          run-tests: "true"

  # Phase 08 Plan 04: replaced the old helper-test Swift job with a
  # helper-smoke job that LAUNCHES both bundles end-to-end. This
  # matches CONTEXT.md § "Verification mandate" — run the tool, don't
  # grep source. `open -W -n` forces LaunchServices registration so a
  # malformed Info.plist fails the job the way a user double-click would.
  helper-smoke:
    name: Helper build + smoke launch
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"
      - name: zig version
        run: zig version
      - name: zig build
        working-directory: helper
        run: zig build --summary all
      - name: zig build test
        working-directory: helper
        run: zig build test --summary all
      - name: ShokiRunner --version smoke
        working-directory: helper
        run: ./.build/ShokiRunner.app/Contents/MacOS/ShokiRunner --version
      - name: ShokiSetup --self-test smoke
        working-directory: helper
        run: ./.build/ShokiSetup.app/Contents/MacOS/ShokiSetup --self-test
      - name: LaunchServices registration smoke — ShokiRunner
        working-directory: helper
        # `open -W -n` waits for the bundle to exit; --args --version forces
        # the binary down the fast-path instead of parking on dispatch_main.
        # This catches Info.plist / LaunchServices rejection that a plain
        # exe invocation would miss.
        run: open -W -n .build/ShokiRunner.app --args --version
      - name: LaunchServices registration smoke — ShokiSetup
        working-directory: helper
        run: open -W -n .build/ShokiSetup.app --args --self-test
      - name: Bundle structure verify
        working-directory: helper
        run: |
          test -f .build/ShokiRunner.app/Contents/Info.plist
          test -f .build/ShokiSetup.app/Contents/Info.plist
          test -x .build/ShokiRunner.app/Contents/MacOS/ShokiRunner
          test -x .build/ShokiSetup.app/Contents/MacOS/ShokiSetup
          test -f .build/libShokiXPCClient.dylib

  sdk-test-native:
    name: SDK tests with native binding (darwin-arm64)
    runs-on: macos-14
    needs: [zig-test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      # Phase 5: setup-action quiesces background apps before the SDK tests
      # so VoiceOver-dispatched announcements aren't polluted by Slack etc.
      # skip-doctor because shoki CLI isn't built yet in this flow.
      - uses: ./.github/actions/setup
        with:
          topology: github-hosted
          skip-doctor: "true"
      - run: pnpm install --frozen-lockfile
      - uses: ./.github/actions/build-zig-binding
        with:
          target: aarch64-macos
          binding-package-dir: packages/binding-darwin-arm64
      - uses: ./.github/actions/build-helper-app
        with:
          sign: "false"
      - name: Run SDK tests with native binding
        env:
          SHOKI_NATIVE_BUILT: "1"
        run: pnpm --filter shoki test
      - name: Post-job background-app quiesce
        if: always()
        run: .github/actions/setup/kill-background-apps.sh

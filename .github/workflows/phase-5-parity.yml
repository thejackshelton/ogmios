# Phase 5 parity gate — CI-06.
#
# Runs `examples/vitest-browser-qwik` on all 4 supported ogmios topologies
# as a matrix. All 4 cells must pass for the release pipeline to proceed.
#
# This is the gate that closes Phase 5 SC-4 ("parity across environments").
#
# Notes on the matrix cells:
#   - `tart`: requires a self-hosted runner with the `tart` label + the
#     pre-baked ogmios image pulled locally. In this repo we skip the tart
#     cell on fork PRs because forks don't have access to our self-hosted
#     pool; maintainers exercise it on main branch pushes and tag builds.
#   - `cirrus`: requires the Cirrus Runners GitHub App installed.
#   - `getmac`: requires a GetMac-hosted runner labelled `getmac`.
#   - `github-hosted`: stock macos-latest — always available.
#
# `continue-on-error` is INTENTIONALLY off. If a topology is unavailable
# (e.g. we haven't wired tart yet on main), skip the job via `if:` rather
# than letting it fail green.

name: Phase 5 parity

on:
  push:
    branches: [main]
    paths:
      - "examples/vitest-browser-qwik/**"
      - ".github/actions/setup/**"
      - "infra/tart/**"
      - ".github/workflows/phase-5-parity.yml"
  pull_request:
    paths:
      - "examples/vitest-browser-qwik/**"
      - ".github/actions/setup/**"
      - "infra/tart/**"
      - ".github/workflows/phase-5-parity.yml"
  workflow_dispatch:

jobs:
  # ---- Tart (self-hosted) ----
  tart:
    name: parity — tart (self-hosted)
    runs-on: [self-hosted, macOS, tart]
    # Only run tart on main/tag pushes and workflow_dispatch — fork PRs
    # won't have self-hosted access, and we don't want the matrix to fail
    # on "pending runner" forever.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    env:
      OGMIOS_TART: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: ./.github/actions/setup
        with:
          topology: tart
          macos-version: sonoma
      - run: pnpm install --frozen-lockfile
      - name: Run parity example
        working-directory: examples/vitest-browser-qwik
        run: pnpm test
      - name: Post-job cleanup
        if: always()
        run: .github/actions/setup/kill-background-apps.sh

  # ---- Cirrus Runners ----
  cirrus:
    name: parity — cirrus runners
    runs-on: ghcr.io/cirruslabs/macos-runner:sonoma
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: ./.github/actions/setup
        with:
          topology: cirrus
          macos-version: sonoma
      - run: pnpm install --frozen-lockfile
      - name: Run parity example
        working-directory: examples/vitest-browser-qwik
        run: pnpm test
      - name: Post-job cleanup
        if: always()
        run: .github/actions/setup/kill-background-apps.sh

  # ---- GetMac ----
  getmac:
    name: parity — getmac
    runs-on: [self-hosted, macOS, getmac]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    env:
      GETMAC: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: ./.github/actions/setup
        with:
          topology: getmac
          macos-version: sonoma
      - run: pnpm install --frozen-lockfile
      - name: Run parity example
        working-directory: examples/vitest-browser-qwik
        run: pnpm test
      - name: Post-job cleanup
        if: always()
        run: .github/actions/setup/kill-background-apps.sh

  # ---- GitHub-hosted macos-latest ----
  github-hosted:
    name: parity — github-hosted macos-latest
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: ./.github/actions/setup
        with:
          topology: github-hosted
          macos-version: sonoma
      - run: pnpm install --frozen-lockfile
      - name: Run parity example
        working-directory: examples/vitest-browser-qwik
        run: pnpm test
      - name: Post-job cleanup
        if: always()
        run: .github/actions/setup/kill-background-apps.sh

  # Final synthesis job so `required status check = "parity"` is easy to
  # configure on the branch protection rule.
  parity:
    name: parity (all topologies)
    needs: [tart, cirrus, getmac, github-hosted]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summarize
        shell: bash
        run: |
          declare -A RESULTS=(
            [tart]="${{ needs.tart.result }}"
            [cirrus]="${{ needs.cirrus.result }}"
            [getmac]="${{ needs.getmac.result }}"
            [github-hosted]="${{ needs.github-hosted.result }}"
          )
          FAILED=()
          for t in "${!RESULTS[@]}"; do
            r="${RESULTS[$t]}"
            echo "topology=$t result=$r"
            # "skipped" is acceptable for tart/getmac on fork PRs; "failure" is not.
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              FAILED+=("$t")
            fi
          done
          if (( ${#FAILED[@]} > 0 )); then
            echo "::error::parity failed on: ${FAILED[*]}"
            exit 1
          fi
          echo "parity: all topologies green (or intentionally skipped)"

name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build VitePress site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # docs/ is NOT a pnpm workspace member (Plan 08-06). Install standalone.
      # `--ignore-workspace` prevents pnpm from walking up to the repo root
      # pnpm-workspace.yaml (which lists packages/* + examples/* and would
      # skip docs/ entirely, leaving devDependencies uninstalled).
      # `--frozen-lockfile=false` lets CI bootstrap the docs-local lockfile on
      # first deploy without failing on a missing committed lockfile.
      - name: Install docs dependencies
        working-directory: docs
        run: pnpm install --ignore-workspace --frozen-lockfile=false
      - name: Build docs
        working-directory: docs
        run: pnpm build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

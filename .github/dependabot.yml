version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: swift
    directory: /helper
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

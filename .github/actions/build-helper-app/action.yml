name: Build helper apps
description: >-
  Builds ShokiRunner.app + ShokiSetup.app via helper/scripts/build-app-bundle.sh
  (zig build) and optionally signs + notarizes both when Apple secrets are
  present. Used by the `helper-smoke` CI job and by .github/workflows/app-release.yml
  (Plan 10-03). Does NOT bundle the .apps into npm binding packages — Phase 10
  moved helper distribution to GitHub Releases (see app-release.yml).

inputs:
  sign:
    description: "Sign + notarize the built .apps (requires APPLE_* env)"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install Zig 0.16
      uses: mlugg/setup-zig@v2
      with:
        version: "0.16.0"

    - name: Verify Zig version
      shell: bash
      run: |
        zig version
        case "$(zig version)" in
          0.16.*) echo "zig 0.16 detected";;
          *) echo "warn: expected zig 0.16.x, got $(zig version)";;
        esac

    - name: Build both app bundles
      shell: bash
      working-directory: helper
      run: |
        set -euo pipefail
        ./scripts/build-app-bundle.sh
        ls -la .build/ShokiRunner.app .build/ShokiSetup.app

    - name: Sign + notarize both bundles
      if: inputs.sign == 'true'
      shell: bash
      working-directory: helper
      run: |
        set -euo pipefail
        if [[ -z "${DEVELOPER_ID_IDENTITY:-}" && -z "${APPLE_DEVELOPER_ID_APP:-}" ]]; then
            echo "warn: no sign identity set (DEVELOPER_ID_IDENTITY / APPLE_DEVELOPER_ID_APP) — skipping sign+notarize"
            exit 0
        fi
        export APPLE_DEVELOPER_ID_APP="${APPLE_DEVELOPER_ID_APP:-$DEVELOPER_ID_IDENTITY}"
        for app in .build/ShokiRunner.app .build/ShokiSetup.app; do
            ./scripts/sign-and-notarize.sh "$app"
        done

    - name: Assert no .app leaks into binding packages
      shell: bash
      run: |
        set -euo pipefail
        # Phase 10-04 guard: helper bundles must never land inside the
        # packages/binding-darwin-* directories. They ship via GitHub Releases
        # (app-release.yml), not npm. This catches accidental resurrections
        # of the old "copy .apps into binding package" step.
        if find packages/binding-darwin-* -maxdepth 4 -name '*.app' -type d 2>/dev/null | grep -q .; then
            echo "ERROR: .app bundle found inside a binding package directory." >&2
            echo "       Helper .apps ship via app-release.yml — never via npm tarballs." >&2
            find packages/binding-darwin-* -maxdepth 4 -name '*.app' -type d >&2
            exit 1
        fi
        echo "ok: no .app bundles under packages/binding-darwin-*"

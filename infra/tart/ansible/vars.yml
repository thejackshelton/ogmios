---
# Shared vars for the ogmios VO-ready image playbook.
# Referenced from playbook.yml via `vars_files:`.

# The helper app bundle that Ogmios signs as the stable TCC trust anchor.
# See Phase 1 Plan 04: OgmiosRunner.app is the process holding Accessibility +
# Automation grants, regardless of what Node/terminal/shell spawns it.
ogmios_bundle_id: "org.ogmios.runner"

# The path the helper is expected to be installed at INSIDE the VM.
# Consumer workflows drop the signed helper here via the setup action before
# tests run; the bundle ID matching is what TCC keys off of.
ogmios_helper_install_path: "/Applications/OgmiosRunner.app"

# Toolchain versions — frozen at image bake time, consumers can override
# per-job via actions/setup-node if they need a newer one.
node_version: "24"
pnpm_version: "10"
playwright_install: true

# Background apps we want to preemptively nerf at image-bake time.
# These all emit announcements that leak into VO captures. Runtime `kill-background-apps.sh`
# is the defensive pass; this image-bake pass is the belt.
background_apps_to_disable:
  - "Slack"
  - "Discord"
  - "Teams"
  - "Microsoft Teams"
  - "Mail"
  - "Calendar"
  - "Reminders"
  - "Notes"
  - "Messages"
  - "Spotify"
  - "Music"

# Services to disable for CI-flake reduction. These are not security-sensitive
# inside an ephemeral VM.
services_to_disable:
  - "com.apple.metadata.mds"                  # Spotlight
  - "com.apple.metadata.mds.index"
  - "com.apple.backupd"                       # Time Machine
  - "com.apple.softwareupdated"               # macOS updates
  - "com.apple.suggestd"                      # Siri suggestions
  - "com.apple.telemetry.coreanalytics"       # telemetry
